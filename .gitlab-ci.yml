image: node:20-alpine

stages:
  - validate

default:
  cache:
    key:
      files:
        - package.json
    paths:
      - .npm/
  before_script:
    - npm config set cache .npm --global
    - npm install

build:
  stage: validate
  script:
    - npm run build
    - test -f dist/nodes/Maltiverse/Maltiverse.node.js
    - test -f dist/credentials/MaltiverseApi.credentials.js
    - test -f dist/nodes/Maltiverse/maltiverse.svg

lint:
  stage: validate
  script:
    - npm run lint

package-smoke:
  stage: validate
  script:
    - npm run build
    - npm pack --dry-run
