services:
  n8n:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_EDITOR_BASE_URL: http://localhost:5678
      WEBHOOK_URL: http://localhost:5678
      N8N_CUSTOM_EXTENSIONS: /opt/n8n/custom
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
